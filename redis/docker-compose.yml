version: "3.7"

services:
  redis:
    image: redis
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - ./datadir:/data
      # - ./conf/redis.conf:/usr/local/etc/redis/redis.conf
      - ./logs:/logs
    restart: always
    # network_mode: host
    command: redis-server # /user/local/etc/redis.conf
